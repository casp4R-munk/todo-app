<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete {
            background: red;
            width: auto;
            padding: 5px 10px;
        }

        .logout {
            background: gray;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <button class="logout" onclick="logout()">Logg ut</button>

    <h1>MIN NYE APP 🔥</h1>

    <input type="text" id="taskInput" placeholder="Skriv oppgave...">
    <button onclick="addTask()">Legg til</button>

    <ul id="taskList"></ul>

</div>

<script>
async function loadTasks() {
    const res = await fetch("/tasks")
    const tasks = await res.json()

    const list = document.getElementById("taskList")
    list.innerHTML = ""

    tasks.forEach(task => {
        const li = document.createElement("li")
        li.innerText = task.text

        const btn = document.createElement("button")
        btn.innerText = "X"
        btn.className = "delete"
        btn.onclick = () => deleteTask(task.id)

        li.appendChild(btn)
        list.appendChild(li)
    })
}

async function addTask() {
    const input = document.getElementById("taskInput")
    const text = input.value

    if (text === "") return

    await fetch("/tasks", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
    })

    input.value = ""
    loadTasks()
}

async function deleteTask(id) {
    await fetch(`/tasks/${id}`, {
        method: "DELETE"
    })

    loadTasks()
}

function logout() {
    window.location.href = "/logout"
}

loadTasks()
</script>

</body>
</html>
